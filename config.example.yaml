listen_addr: ":8080"
strategy: "weighted" # round-robin | least-connections | weighted

health_check:
  interval: "5s"
  timeout: "2s"
  fail_threshold: 2
  pass_threshold: 1

rate_limit:
  enabled: false
  rate: 120
  burst: 60
  heat_half_life: "5s"
  heat_cost: 1.3
  max_keys: 4096
  key_header: "X-User-ID"

backends:
  - name: "users-a"
    url: "http://127.0.0.1:9001"
    weight: 3
    health_path: "/health"

  - name: "users-b"
    url: "http://127.0.0.1:9002"
    weight: 1
    health_path: "/health"
